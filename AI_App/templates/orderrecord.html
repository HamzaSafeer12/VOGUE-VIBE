<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Vogue Vibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="bg-white border-b border-gray-100 mb-8">
        <div class="max-w-6xl mx-auto px-4 py-8">
            <h1 class="text-3xl font-extrabold text-gray-900">Order History</h1>
            <p class="text-gray-500 mt-2">Manage and track your recent orders.</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 pb-20">
        <div id="loading" class="text-center py-20">
            <div class="animate-spin inline-block w-10 h-10 border-[3px] border-current border-t-transparent text-indigo-600 rounded-full"></div>
            <p class="mt-4 text-gray-500 font-medium">Fetching your orders...</p>
        </div>

        <div id="orders-list" class="space-y-6 hidden">
            </div>

        <div id="empty-state" class="hidden text-center py-20 bg-white rounded-3xl border border-dashed border-gray-300">
            <h3 class="text-xl font-bold text-gray-800">No orders yet!</h3>
            <p class="text-gray-500 mt-2">Looks like you haven't shopped anything yet.</p>
            <a href="/" class="mt-6 inline-block bg-black text-white px-8 py-3 rounded-full font-bold hover:bg-indigo-600 transition-all">Start Shopping</a>
        </div>
    </div>

    <script>
        async function fetchOrders() {
            try {
                const response = await fetch('/api/ordersrecord/', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('access_token') // Agar login zaroori hai
                    }
                });

                const data = await response.json();
                const container = document.getElementById('orders-list');
                const loading = document.getElementById('loading');
                const empty = document.getElementById('empty-state');

                loading.classList.add('hidden');

                if (data.length === 0) {
                    empty.classList.remove('hidden');
                    return;
                }

                container.classList.remove('hidden');
                
                container.innerHTML = data.map(order => `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="bg-gray-50/50 px-6 py-4 border-b border-gray-100 flex flex-wrap justify-between items-center gap-4">
                            <div class="flex gap-8">
                                <div>
                                    <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold">Order ID</p>
                                    <p class="font-bold text-gray-900">#${order.id}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold">Date Placed</p>
                                    <p class="font-semibold text-gray-700">${new Date(order.created_at).toLocaleDateString('en-GB')}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] uppercase tracking-wider text-gray-400 font-bold">Total Amount</p>
                                    <p class="font-bold text-indigo-600">$${order.total_amount || 'N/A'}</p>
                                </div>
                            </div>
                            <div>
                                <span class="px-4 py-1.5 rounded-full text-xs font-bold ${getStatusClass(order.status)}">
                                    ${order.status}
                                </span>
                            </div>
                        </div>

                        <div class="px-6 py-4">
                            <div class="divide-y divide-gray-100">
                                ${order.items.map(item => `
    <div class="py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-20 h-20 bg-gray-100 rounded-xl flex-shrink-0 overflow-hidden border border-gray-100">
                ${item.image 
                    ? `<img src="${item.image}" alt="${item.ProductName}" class="w-full h-full object-cover">`
                    : `<div class="w-full h-full flex items-center justify-center text-[10px] text-gray-400 font-bold uppercase">No Img</div>`
                }
            </div>
            
            <div>
                <h4 class="font-bold text-gray-800 text-sm md:text-base">${item.ProductName}</h4>
                <p class="text-xs text-gray-500 mt-1">Quantity: <span class="font-semibold text-gray-700">${item.quantity}</span></p>
            </div>
        </div>
        <div class="text-right">
            <p class="font-bold text-gray-900">$${item.price}</p>
        </div>
    </div>
`).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Error fetching orders:", error);
            }
        }

        function getStatusClass(status) {
            switch(status) {
                case 'Paid': return 'bg-green-100 text-green-700';
                case 'Pending': return 'bg-yellow-100 text-yellow-700';
                case 'Shipped': return 'bg-blue-100 text-blue-700';
                case 'Cancelled': return 'bg-red-100 text-red-700';
                default: return 'bg-gray-100 text-gray-700';
            }
        }

        fetchOrders();
    </script>
</body>
</html>
