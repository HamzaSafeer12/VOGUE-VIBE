<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Vogue Vibe | Premium Store</title>
    <style>
        .product-card:hover { transform: translateY(-5px); }
        .size-btn-active {
            background-color: #4f46e5 !important;
            color: white !important;
            border-color: #4f46e5 !important;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div class="bg-indigo-600 text-white text-center py-2 text-sm font-medium">
        🎉 20% OFF on your first purchase! Use code: <span class="underline">HELLO20</span>
    </div>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="/" class="text-2xl font-black text-slate-900 tracking-tight">
                VOGUE <span class="text-indigo-600">VIBE.</span>
            </a>

            <div class="hidden md:flex items-center space-x-10">
                <a href="/" class="text-slate-600 hover:text-indigo-600 font-semibold transition">Home</a>
                <div class="relative group">
                    <button class="flex items-center space-x-1 text-slate-800 hover:text-indigo-600 font-semibold py-4">
                        <span>SHOP</span>
                        <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/></svg>
                    </button>
                    <div id="category-dropdown" class="absolute hidden group-hover:block bg-white shadow-2xl border border-slate-100 rounded-xl w-56 py-3 mt-0"></div>
                </div>
            </div>

            <div class="flex items-center space-x-6">
                <div id="auth-section" class="flex items-center gap-4"></div>
                <div class="relative cursor-pointer group" onclick="window.location.href='/cart-page/'">
                    <svg class="w-7 h-7 text-slate-800 group-hover:text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-indigo-600 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="bg-white py-12 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h2 class="text-4xl md:text-5xl font-extrabold text-slate-900 leading-tight">
                Redefine Your Style <br> <span class="text-indigo-600">Every Day.</span>
            </h2>
            <p class="mt-4 text-slate-500 text-lg">Exquisite fabrics and timeless designs, tailored just for you.</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10"></div>
        <div class="flex justify-center mt-12 mb-16">
            <button id="load-more-btn" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-900 transition-all shadow-lg hidden">
                Load More Style
            </button>
        </div>
    </main>

    <script>
    const BASE_URL = '/api';
    let nextUrl = `${BASE_URL}/products/`;
    const productContainer = document.getElementById('product-container');
    const loadMoreBtn = document.getElementById('load-more-btn');
    let selectedVariants = {}; 

    // 1. Fetch Categories
    fetch(`${BASE_URL}/categories/`)
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById('category-dropdown');
            container.innerHTML = `<a href="javascript:void(0)" onclick="filterByCategory(null)" class="block px-6 py-2.5 text-sm font-bold text-indigo-600 border-b border-slate-50 hover:bg-slate-50 transition-colors">✨ Show All Products</a>`;
            data.forEach(cat => {
                container.innerHTML += `<a href="javascript:void(0)" onclick="filterByCategory(${cat.id})" class="block px-6 py-2.5 text-sm text-slate-700 hover:bg-indigo-50 hover:text-indigo-600 font-medium transition-colors">${cat.name}</a>`;
            });
        });

    // 2. Load Products Function
    function loadProducts() {
        if (!nextUrl) return;
        fetch(nextUrl).then(res => res.json()).then(data => {
            data.results.forEach(product => {
                let sizesHTML = '';
                if (product.variants && product.variants.length > 0) {
                    product.variants.forEach(variant => {
                        const isOutOfStock = variant.stock <= 0;
                        sizesHTML += `<button onclick="selectSize(this, ${product.id}, ${variant.id})" ${isOutOfStock ? 'disabled' : ''} class="size-btn border border-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold transition-all hover:border-indigo-600 disabled:opacity-30 disabled:cursor-not-allowed">${variant.size.name}</button>`;
                    });
                } else {
                    sizesHTML = '<p class="text-xs text-slate-400">No sizes available</p>';
                }

                productContainer.innerHTML += `
                    <div class="product-card group bg-white rounded-3xl border border-slate-100 p-4 transition-all duration-300">
                        <div class="relative overflow-hidden rounded-2xl bg-slate-100">
                            <img src="${product.image}" class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold text-slate-800 uppercase tracking-widest">${product.category_name}</div>
                        </div>
                        <div class="mt-5">
                            <h3 class="text-lg font-bold text-slate-900 truncate">${product.name}</h3>
                            <div class="mt-3"><span class="text-2xl font-black text-slate-900">$${product.price}</span></div>
                            <div class="mt-4">
                                <p class="text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-2">Available Sizes</p>
                                <div class="flex flex-wrap gap-2" id="product-sizes-${product.id}">${sizesHTML}</div>
                            </div>
                            <button id="add-btn-${product.id}" onclick="addToCart(${product.id})" class="w-full mt-5 bg-slate-100 text-slate-400 h-11 rounded-xl font-bold transition-all cursor-not-allowed" disabled>Select Size</button>
                        </div>
                    </div>`;
            });
            nextUrl = data.next;
            nextUrl ? loadMoreBtn.classList.remove('hidden') : loadMoreBtn.classList.add('hidden');
        });
    }

    // 3. Size Toggle Logic
    function selectSize(btn, productId, variantId) {
        const container = document.getElementById(`product-sizes-${productId}`);
        const addBtn = document.getElementById(`add-btn-${productId}`);

        if (btn.classList.contains('size-btn-active')) {
            btn.classList.remove('size-btn-active');
            delete selectedVariants[productId];
            addBtn.disabled = true;
            addBtn.innerText = "Select Size";
            addBtn.className = "w-full mt-5 bg-slate-100 text-slate-400 h-11 rounded-xl font-bold transition-all cursor-not-allowed";
        } else {
            container.querySelectorAll('.size-btn').forEach(b => b.classList.remove('size-btn-active'));
            btn.classList.add('size-btn-active');
            selectedVariants[productId] = variantId;
            addBtn.disabled = false;
            addBtn.innerText = "Add to Cart";
            addBtn.className = "w-full mt-5 bg-indigo-600 text-white h-11 rounded-xl font-bold hover:bg-slate-900 transition-all shadow-lg";
        }
    }

    // 4. Asli API Add to Cart Logic
    async function addToCart(productId) {
        const variantId = selectedVariants[productId];
        const token = localStorage.getItem('access_token');

        if (!token) {
            alert("Please login first to add items to cart!");
            window.location.href = '/login/';
            return;
        }

        try {
            const response = await fetch(`${BASE_URL}/cart/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ variant: variantId, quantity: 1 })
            });

            if (response.ok) {
                alert("Successfully added to your cart!");
                fetchCartCount(); // Count update karo
            } else {
                alert("Something went wrong. Please try again.");
            }
        } catch (error) {
            console.error("Cart Error:", error);
        }
    }

    // 5. Fetch Real-time Cart Count
    async function fetchCartCount() {
    const token = localStorage.getItem('access_token');
    if (!token) return;

    try {
        const res = await fetch(`${BASE_URL}/cart/`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.status === 401) {
            // AGAR TOKEN EXPIRE HAI: Toh sab saaf karo
            console.log("Token expired during count fetch.");
            localStorage.removeItem('access_token');
            localStorage.removeItem('username');
            updateAuthUI(); // UI ko wapis login par le jao
            return;
        }

        const data = await res.json();
        // Check karein ke data array hai ya nahi
        document.getElementById('cart-count').innerText = Array.isArray(data) ? data.length : '0';
        
    } catch (err) { 
        console.log("Fetch error:", err);
        document.getElementById('cart-count').innerText = '0';
    }
}

    function filterByCategory(id) {
        nextUrl = id ? `${BASE_URL}/products/?category=${id}` : `${BASE_URL}/products/`;
        productContainer.innerHTML = '';
        loadProducts();
    }

    function updateAuthUI() {
    const authSection = document.getElementById('auth-section');
    const token = localStorage.getItem('access_token');
    const username = localStorage.getItem('username') || 'User'; // undefined se bachne ke liye default value

    if (token) {
        // Agar token hai, toh UI dikhao
        authSection.innerHTML = `
            <span class="text-sm font-medium text-slate-500 hidden md:block italic">Hello, ${username}</span>
            <button onclick="handleLogout()" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-indigo-600 transition-all">Logout</button>
        `;
        fetchCartCount(); // Yeh function call hoga
    } else {
        // Agar token nahi hai, toh Login/Signup dikhao
        authSection.innerHTML = `
            <a href="/login/" class="text-slate-900 font-bold text-sm mr-4">Login</a>
            <a href="/signup/" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold text-sm">Sign Up</a>
        `;
        document.getElementById('cart-count').innerText = '0';
    }
}

    function handleLogout() { localStorage.clear(); window.location.href = '/'; }

    loadProducts();
    loadMoreBtn.addEventListener('click', loadProducts);
    document.addEventListener('DOMContentLoaded', updateAuthUI);
</script>
</body>
</html>
