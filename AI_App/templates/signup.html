<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Join VOGUE VIBE | Premium Fashion Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <div class="bg-indigo-600 text-white text-center py-2 text-xs font-bold tracking-widest uppercase">
        Free Shipping on Orders Above $100
    </div>

    <nav class="bg-white border-b border-slate-200 h-20 flex items-center px-6 md:px-20">
        <a href="/" class="text-2xl font-black text-slate-900 tracking-tighter">
            VOGUE<span class="text-indigo-600">VIBE.</span>
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6 md:p-12">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 overflow-hidden flex flex-col md:flex-row">
            
            <div class="hidden md:flex md:w-1/3 bg-indigo-600 p-10 flex-col justify-between text-white">
                <div>
                    <h3 class="text-2xl font-bold leading-tight">Style is a way to say who you are without having to speak.</h3>
                </div>
                <div class="text-sm opacity-80">
                    © 2026 VOGUE VIBE Fashion
                </div>
            </div>

            <div class="flex-grow p-8 md:p-12">
                <div class="mb-10">
                    <h2 class="text-3xl font-extrabold text-slate-900">Create Account</h2>
                    <p class="text-slate-500 mt-2 font-medium">Step into the world of premium fashion.</p>
                </div>

                <form id="signup-form" class="space-y-5">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-xs font-extrabold text-slate-700 uppercase tracking-wider mb-2">Username</label>
                            <input type="text" id="username" required 
                                class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:border-indigo-600 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all placeholder:text-slate-400"
                                placeholder="shazeb_vibes">
                        </div>

                        <div>
                            <label class="block text-xs font-extrabold text-slate-700 uppercase tracking-wider mb-2">Email Address</label>
                            <input type="email" id="email" required 
                                class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:border-indigo-600 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all placeholder:text-slate-400"
                                placeholder="name@email.com">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-xs font-extrabold text-slate-700 uppercase tracking-wider mb-2">Password</label>
                            <input type="password" id="password" required 
                                class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:border-indigo-600 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all placeholder:text-slate-400"
                                placeholder="••••••••">
                        </div>

                        <div>
                            <label class="block text-xs font-extrabold text-slate-700 uppercase tracking-wider mb-2">Phone Number</label>
                            <input type="text" id="phone_number" required 
                                class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:border-indigo-600 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all placeholder:text-slate-400"
                                placeholder="+92 3XX XXXXXXX">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-extrabold text-slate-700 uppercase tracking-wider mb-2">Complete Address</label>
                        <textarea id="address" rows="3" required
                            class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:border-indigo-600 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all placeholder:text-slate-400"
                            placeholder="House #, Street, City, Country"></textarea>
                    </div>

                    <button type="submit" 
                        class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-indigo-600 transform hover:-translate-y-1 transition-all duration-300 shadow-xl shadow-slate-200 mt-4">
                        Create My Account
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <p class="text-slate-500 font-medium">Already have an account? 
                        <a href="/login/" class="text-indigo-600 font-bold hover:underline ml-1">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Collect data from fields
            const signupData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                phone_number: document.getElementById('phone_number').value,
                address: document.getElementById('address').value
            };

            console.log("Submitting to API...", signupData);

            // API Call
            fetch('/api/signup/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Agar CSRF token ki zaroorat ho toh yahan add karein
                },
                body: JSON.stringify(signupData)
            })
            .then(response => {
                if (response.ok) {
                    // alert('Welcome to VOGUE VIBE! Redirecting to login...');
                    window.location.href = '/login/';
                } else {
                    alert('Registration failed. Please check your data.');
                }
            })
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
