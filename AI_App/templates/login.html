<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login | VOGUE VIBE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 h-20 flex items-center px-6 md:px-20">
        <a href="/" class="text-2xl font-black text-slate-900 tracking-tighter">
            VOGUE<span class="text-indigo-600">VIBE.</span>
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 p-8 md:p-12">
            
            <div class="text-center mb-10">
                <h2 class="text-3xl font-extrabold text-slate-900">Welcome Back</h2>
                <p class="text-slate-500 mt-2 font-medium">Please enter your details to sign in.</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-extrabold text-slate-700 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="username" required 
                        class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:border-indigo-600 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all placeholder:text-slate-400"
                        placeholder="your_username">
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="text-xs font-extrabold text-slate-700 uppercase tracking-wider">Password</label>
                        <a href="#" class="text-xs font-bold text-indigo-600 hover:underline">Forgot?</a>
                    </div>
                    <input type="password" id="password" required 
                        class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:border-indigo-600 focus:bg-white focus:ring-4 focus:ring-indigo-50 outline-none transition-all placeholder:text-slate-400"
                        placeholder="••••••••">
                </div>

                <button type="submit" 
                    class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-indigo-600 transform hover:-translate-y-1 transition-all duration-300 shadow-xl shadow-slate-200 mt-4">
                    Sign In
                </button>
            </form>

            <div class="mt-10 text-center border-t border-slate-100 pt-8">
                <p class="text-slate-500 font-medium">Don't have an account? 
                    <a href="/signup/" class="text-indigo-600 font-bold hover:underline ml-1">Create Account</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const loginData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            console.log("Logging in...", loginData);

            // API Call for Login (Aksar JWT Token lene ke liye hoti hai)
            fetch('/api/token/', { // Apni login/token API ka path dein
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData)
            })
            .then(res => res.json())
            .then(data => {
                if(data.access) {
                    // Token ko Browser mein save karna (Bohat zaroori!)
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    
                    // alert("Login Successful!");
                    window.location.href = '/'; // Home page par bhejein
                } else {
                    alert("Invalid credentials. Try again.");
                }
            })
            .catch(err => console.error("Login Error:", err));
        });
    </script>
</body>
</html>
